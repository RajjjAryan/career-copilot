name: Feature Request
description: Propose a new feature or enhancement
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why is it needed?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you solve this?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New Workflow Mode
        - Existing Mode Enhancement
        - Dashboard Improvement
        - Pipeline/Tracker
        - Multi-CLI Support
        - Internationalization (i18n)
        - Documentation
        - Developer Experience
        - Other
